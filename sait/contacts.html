<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | National Parks Coins</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header__wrapper">

            <div class="header__logo">
                <a href="index.html" class="header__links">National Parks Coins</a>
            </div>

            <nav class="header__nav">
                <a href="index.html" class="header__link">Главная</a>
                <a href="about.html" class="header__link">О серии</a>
                <a href="coins.html" class="header__link">Монеты</a>
                <a href="gallery.html" class="header__link">Галерея</a>
                <a href="contacts.html" class="header__link">Контакты</a>
            </nav>

        </div>
    </div>
</header>

<section class="section">
    <div class="container">

        <h1 class="section__title">
            Связаться с нами
        </h1>

        <form class="form">

            <input
                type="text"
                class="form__input"
                placeholder="Ваше имя"
                required>

            <input
                type="email"
                class="form__input"
                placeholder="Ваш Email"
                required>

            <textarea
                class="form__textarea"
                placeholder="Ваше сообщение"
                required></textarea>

            <button
                type="submit"
                class="form__button">
                Отправить
            </button>

        </form>

    </div>
</section>

<section class="section">
    <div class="container">

        <h2 class="section__title">
            Наше расположение
        </h2>

        <iframe
            src="https://www.google.com/maps?q=Washington&output=embed"
            width="100%"
            height="400"
            style="border:0; border-radius:15px;"
            loading="lazy">
        </iframe>

    </div>
</section>

<section class="section">
    <div class="container">

        <h2 class="section__title">
            Контактная информация
        </h2>

        <p style="text-align:center;">
            Email: info@nationalparkscoins.com
        </p>

        <p style="text-align:center;">
            Телефон: +1 (202) 555-1234
        </p>

        <p style="text-align:center;">
            Вашингтон, США
        </p>

    </div>
</section>

<footer class="footer">
    <p>© 2026 National Parks Coins</p>
</footer>

<script src="script.js"></script>

</body>
</html>
